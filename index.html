            '严格控制杠杆比例',
            '务必做好止损纪律',
            '保持充足现金流，避免满仓',
          ],
          color: '#E91E63',
          icon: '勇',
        },
      ];

      function calculateProfile(totalScore) {
        let profileType;
        if (totalScore <= 16) {
          profileType = 'conservative';
        } else if (totalScore <= 24) {
          profileType = 'balanced';
        } else if (totalScore <= 28) {
          profileType = 'aggressive';
        } else {
          profileType = 'adventurous';
        }
        return profiles.find(p => p.type === profileType) || profiles[0];
      }

      class QuizApp {
        constructor() {
          this.currentPage = 'home';
          this.currentQuestion = 0;
          this.answers = [];
          this.score = 0;
          this.profile = null;
          this.init();
        }

        init() {
          this.render();
        }

        render() {
          const root = document.getElementById('root');
          switch (this.currentPage) {
            case 'home':
              root.innerHTML = this.renderHome();
              this.bindHomeEvents();
              break;
            case 'quiz':
              root.innerHTML = this.renderQuiz();
              this.bindQuizEvents();
              break;
            case 'result':
              root.innerHTML = this.renderResult();
              this.bindResultEvents();
              break;

        }

        renderHome() {
          return `
            <div class="min-h-screen geometric-bg flex flex-col items-center justify-center px-4 py-12">

        renderQuiz() {
          const currentQ = questions[this.currentQuestion];
          const progress = ((this.currentQuestion + 1) / questions.length) * 100;
          
          return `
            <div class="min-h-screen geometric-bg flex flex-col px-4 py-8">
              <div class="max-w-xl mx-auto w-full mb-8">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-white/60 text-sm">第 ${this.currentQuestion + 1} 题 / 共 ${questions.length} 题</span>
                  <span class="text-yellow-400 font-bold">${Math.round(progress)}%</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${progress}%"></div>
                </div>
              </div>

              <div class="max-w-xl mx-auto w-full">
                <div class="bg-white rounded-2xl shadow-2xl p-8 card-hover">
                  <div class="inline-flex items-center justify-center w-12 h-12 bg-primary/10 rounded-xl mb-6">
                    <span class="text-primary font-bold text-lg">${currentQ.id}</span>
                  </div>

                  <h2 class="text-2xl font-bold text-gray-800 mb-8 leading-relaxed">${currentQ.text}</h2>

                  <div class="space-y-4">
                    ${currentQ.options.map((option, index) => `
                      <button class="option-btn" data-index="${index}">
                        <div class="option-radio">
                          <svg class="w-5 h-5 text-white hidden" data-index="${index}">
                            <path d="M20 6 9 17l-5-5"></path>
                          </svg>
                        </div>
                        <span class="font-medium text-gray-700">${option.text}</span>
                      </button>
                    `).join('')}
                  </div>
                </div>

                <div class="mt-6">
                  <button id="nextBtn" disabled class="nav-btn bg-gray-200 text-gray-400">
                    ${this.currentQuestion === questions.length - 1 ? '查看结果' : '下一题'}
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="m9 18 6-6-6-6"></path>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          `;
        }

        bindQuizEvents() {
          const options = document.querySelectorAll('.option-btn');
          let selectedIndex = null;

          options.forEach((option, index) => {
            option.addEventListener('click', () => {
              selectedIndex = index;
              options.forEach((opt, i) => {
                if (i === index) {
                  opt.classList.add('selected');
                  opt.querySelector('.option-radio svg').classList.remove('hidden');
                } else {
                  opt.classList.remove('selected');
                  opt.querySelector('.option-radio svg').classList.add('hidden');
                }
              });
              document.getElementById('nextBtn').disabled = false;
              document.getElementById('nextBtn').className = 'nav-btn gradient-button text-primary';
            });
          });

          document.getElementById('nextBtn').addEventListener('click', () => {
            if (selectedIndex !== null) {
              const score = questions[this.currentQuestion].options[selectedIndex].score;
              this.answers.push(score);
              this.score += score;

              if (this.currentQuestion === questions.length - 1) {
                this.profile = calculateProfile(this.score);
                this.currentPage = 'result';
              } else {
                this.currentQuestion++;
              }
              this.render();
            }
          });
        }

        renderResult() {
          if (!this.profile) return '<div class="min-h-screen flex items-center justify-center"><p class="text-white">加载中...</p></div>';

          return `
            <div class="min-h-screen geometric-bg py-12 px-4">
              <div class="max-w-2xl mx-auto">
                <div class="text-center mb-8">
                  <h1 class="text-3xl font-black text-white mb-2">测试完成！</h1>
                  <p class="text-white/60">恭喜你发现了自己的理财人格</p>
                </div>

                <div class="bg-white rounded-3xl p-8 shadow-2xl text-center mb-6">
                  <div class="inline-flex items-center justify-center w-24 h-24 rounded-full mb-6" style="background-color: ${this.profile.color}20">
                    <div class="profile-badge" style="background-color: ${this.profile.color}">
                      ${this.profile.icon}
                    </div>
                  </div>

                  <div class="mb-4">
                    <span class="text-sm font-bold px-4 py-1 rounded-full" style="background-color: ${this.profile.color}20; color: ${this.profile.color}">
                      ${this.profile.title}
                    </span>
                  </div>

                  <h2 class="text-3xl font-black text-gray-800 mb-4">${this.profile.name}</h2>
                  <p class="text-gray-600 leading-relaxed">${this.profile.description}</p>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-lg mb-6">
                  <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center">
                      <svg class="w-5 h-5 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <path d="m9 11 3 3L22 4"></path>
                      </svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800">性格特征</h3>
                  </div>
                  <div class="space-y-3">
                    ${this.profile.traits.map((trait, index) => `
                      <div class="trait-item">
                        <div class="trait-icon">
                          <svg class="w-4 h-4 text-gray-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            ${['shield', 'trending-up', 'zap', 'award'][index % 4] === 'shield' ? '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path>' : ''}
                            ${['shield', 'trending-up', 'zap', 'award'][index % 4] === 'trending-up' ? '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline>' : ''}
                            ${['shield', 'trending-up', 'zap', 'award'][index % 4] === 'zap' ? '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>' : ''}
                            ${['shield', 'trending-up', 'zap', 'award'][index % 4] === 'award' ? '<circle cx="12" cy="8" r="6"></circle><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"></path>' : ''}
                          </svg>
                        </div>
                        <span class="text-gray-600">${trait}</span>
                      </div>
                    `).join('')}
                  </div>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-lg mb-6">
                  <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-yellow-100 rounded-xl flex items-center justify-center">
                      <svg class="w-5 h-5 text-yellow-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"></path>
                        <path d="M9 18h6"></path>
                        <path d="M10 22h4"></path>
                      </svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800">理财建议</h3>
                  </div>
                  <div class="space-y-3">
                    ${this.profile.advice.map((advice, index) => `
                      <div class="advice-item">
                        <div class="advice-number">${index + 1}</div>
                        <span class="text-gray-600">${advice}</span>
                      </div>
                    `).join('')}
                  </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-4">
                  <button id="restartBtn" class="flex-1 py-4 px-6 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-full flex items-center justify-center gap-2 transition-all">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                      <path d="M21 3v5h-5"></path>
                      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                      <path d="M8 16H3v5"></path>
                    </svg>
                    重新测试
                  </button>
                  <button id="shareBtn" class="flex-1 py-4 px-6 gradient-button text-primary font-bold rounded-full flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="18" cy="5" r="3"></circle>
                      <circle cx="6" cy="12" r="3"></circle>
                      <circle cx="18" cy="19" r="3"></circle>
                      <line x1="8.59" x2="15.42" y1="13.51" y2="17.49"></line>
                      <line x1="15.41" x2="8.59" y1="6.51" y2="10.49"></line>
                    </svg>
                    分享结果
                  </button>
                </div>

                <p class="text-center text-white/40 text-sm mt-8">本测试仅供参考，投资有风险，决策需谨慎</p>
              </div>
            </div>
          `;
        }

        bindResultEvents() {
          document.getElementById('restartBtn').addEventListener('click', () => {
            this.currentPage = 'home';
            this.currentQuestion = 0;
            this.answers = [];
            this.score = 0;
            this.profile = null;
            this.render();
          });

          document.getElementById('shareBtn').addEventListener('click', () => {
            const shareText = `我测出了「${this.profile.name}」理财人格！${this.profile.description} 快来测测你的理财人格吧！`;
            
            if (navigator.share) {
              navigator.share({
                title: '测测你的理财人格',
                text: shareText,
              }).catch(() => {
                this.copyToClipboard(shareText);
              });
            } else {
              this.copyToClipboard(shareText);
            }
          });
        }

        copyToClipboard(text) {
          navigator.clipboard.writeText(text).then(() => {
            const shareBtn = document.getElementById('shareBtn');
            shareBtn.innerHTML = '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"></path></svg> 已复制';
            setTimeout(() => {
              shareBtn.innerHTML = '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"></line><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"></line></svg> 分享结果';
            }, 2000);
          });
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        new QuizApp();
      });
    </script>
  </body>
</html>
